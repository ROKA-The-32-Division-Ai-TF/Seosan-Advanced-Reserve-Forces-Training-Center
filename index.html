<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="서산시 과학화 예비군 훈련장 안내용 모바일 웹페이지"
    />
    <meta name="theme-color" content="#11253e" />
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%2311253e'/%3E%3Cpath d='M32 8 50 14v16c0 11-7 19-18 24C21 49 14 41 14 30V14Z' fill='%23ffffff' fill-opacity='.92'/%3E%3C/svg%3E"
    />
    <title>서산시 과학화 예비군 훈련장</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content">본문 바로가기</a>

    <div class="page-shell">
      <header class="hero">
        <div class="hero__watermark" aria-hidden="true">
          <img src="lExcPgSTgV_HoWrsVffyyPGuWyaWdDps7O39XOhIPVj6lCpgS_gLVsGyZ6gbtq5XIXHq3o5mcjUjQArbaQT_DQ.svg" alt="" />
        </div>

        <div class="hero__main">
          <div class="hero__title-wrap">
            <img
              class="hero__brand-mark"
              src="ROKA_32nd_Infantry_Division_Insignia.svg.png"
              alt="사단 마크"
            />

            <div class="hero__copy">
              <p class="hero__eyebrow">Reservist Digital Guide</p>
              <h1 class="hero__title">
                <span class="hero__title-line hero__title-line--first">서산시</span>
                <span class="hero__title-line hero__title-line--second">과학화 예비군 훈련장</span>
              </h1>
            </div>

            <div class="hero__status-inline" aria-label="현재 시간과 날씨">
              <p class="hero__status-single">
                <span class="hero__status-group">
                  <span class="hero__status-key">현재시간</span>
                  <strong id="current-time">불러오는 중</strong>
                </span>
                <span class="hero__status-separator">·</span>
                <span class="hero__status-group">
                  <span class="hero__status-key">날씨</span>
                  <strong id="current-weather">불러오는 중</strong>
                </span>
              </p>
              <p class="hero__status-subline">
                <span id="current-date">불러오는 중</span>
                <span class="hero__status-separator">·</span>
                <span id="weather-meta">실시간 기상 정보 연결 중</span>
              </p>
            </div>
          </div>
        </div>

        <nav class="menu-grid" aria-label="주요 메뉴">
          <a class="menu-card menu-card--survey is-active" href="#survey" data-section-link="survey">
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M8 7h8M8 12h8M8 17h5M6 3h12a2 2 0 0 1 2 2v14l-4-2-4 2-4-2-4 2V5a2 2 0 0 1 2-2Z"
                />
              </svg>
            </span>
            <strong>설문</strong>
          </a>

          <a class="menu-card" href="#meals" data-section-link="meals">
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M7 3v8M10 3v8M8.5 11v10M16 3c0 4-2 5-2 8v10M4 7h9M13 21h7"
                />
              </svg>
            </span>
            <strong>오늘 식단</strong>
          </a>

          <a class="menu-card" href="#notices" data-section-link="notices">
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M6 8h12M6 12h12M6 16h8M5 4h14a1 1 0 0 1 1 1v14l-3-2-3 2-3-2-3 2-3-2V5a1 1 0 0 1 1-1Z"
                />
              </svg>
            </span>
            <strong>공지사항</strong>
          </a>

          <a
            class="menu-card"
            href="https://www.yebigun1.mil.kr/dmobis/rfh/rgt/info/04_01_legislation.jsp"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M12 3 4 7v5c0 5 3.5 8.5 8 9 4.5-.5 8-4 8-9V7l-8-4Zm0 5v7m-3-4h6"
                />
              </svg>
            </span>
            <strong>예비군 법령</strong>
          </a>

          <a class="menu-card" href="#mental-evaluation" data-section-link="mental-evaluation">
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M12 20a7 7 0 1 0-7-7c0 1.7.6 3.2 1.5 4.4L6 21l3.6-.5A6.9 6.9 0 0 0 12 20Zm-1-10h2v5h-2Zm0-3h2v2h-2Z"
                />
              </svg>
            </span>
            <strong>정신전력평가</strong>
          </a>

          <a
            id="chatbot-link"
            class="menu-card"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            aria-disabled="true"
          >
            <span class="menu-card__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path
                  d="M5 6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H9l-4 4V6Zm4 3h6m-6 3h4"
                />
              </svg>
            </span>
            <strong>예비군 챗봇</strong>
          </a>
        </nav>
      </header>

      <main id="main-content" class="content">
        <section id="survey" class="panel panel--accent content-panel is-active" data-section-panel>
          <div class="panel__heading">
            <div>
              <p class="panel__eyebrow">1. 설문</p>
              <h2>훈련 설문</h2>
            </div>
          </div>

          <div class="action-row">
            <p class="action-row__title">훈련 설문 바로가기</p>
            <a
              id="survey-link"
              class="action-button"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-disabled="true"
            >
              설문 참여하기
            </a>
          </div>
        </section>

        <section id="meals" class="panel content-panel" data-section-panel hidden>
          <div class="panel__heading">
            <div>
              <p class="panel__eyebrow">2. 오늘 식단</p>
              <h2>식단 안내</h2>
            </div>
            <span id="today-label" class="panel__tag"></span>
          </div>

          <div id="meal-summary" class="status-card" aria-live="polite"></div>
          <div id="meal-list" class="stack-list" aria-live="polite"></div>
        </section>

        <section id="notices" class="panel content-panel" data-section-panel hidden>
          <div class="panel__heading">
            <div>
              <p class="panel__eyebrow">3. 공지사항</p>
              <h2>최신 공지</h2>
            </div>
            <span class="panel__tag">최신순</span>
          </div>

          <div id="notice-list" class="stack-list" aria-live="polite"></div>
        </section>

        <section id="mental-evaluation" class="panel content-panel" data-section-panel hidden>
          <div class="panel__heading">
            <div>
              <p class="panel__eyebrow">4. 정신전력평가</p>
              <h2>평가 링크</h2>
            </div>
            <span class="panel__tag">준비 상태</span>
          </div>

          <div class="action-row action-row--muted">
            <p class="action-row__title">정신전력평가 링크는 추후 추가 예정입니다.</p>
            <a
              id="mental-link"
              class="action-button action-button--secondary"
              href="#"
              target="_blank"
              rel="noopener noreferrer"
              aria-disabled="true"
            >
              링크 준비 중
            </a>
          </div>
        </section>

      </main>

    </div>

    <script src="data/site-config.js"></script>
    <script src="data/meals.js"></script>
    <script src="data/notices.js"></script>
    <script src="data/regulations.js"></script>
    <script src="script.js"></script>
  </body>
</html>
